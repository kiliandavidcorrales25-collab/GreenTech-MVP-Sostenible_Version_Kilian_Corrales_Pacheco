<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvemos el Planeta - GreenTech</title>

  <style>
    
    body {
      margin: 0; 
      font-family: Arial, sans-serif; 
      background: #f4fdf4; 
    }

    /* Hero principal */
    .hero-gigante {
      height: 100vh; /* Ocupa toda la altura de la ventana */
      display: flex; 
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white; 
      position: relative;
      padding: 20px;
      /* Imagen optimizada */
      background-image: url("https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=1200&auto=format&fit=crop");
      background-size: cover; 
      background-position: center; 
    }

    /* Estilos del título principal */
    .hero-gigante h1 {
      font-size: 4rem;
      margin: 0;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
    }

    /* --- Estilos del subtítulo --- */
    .hero-gigante p {
      font-size: 1.5rem;
      margin-top: 10px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
    }

    /* ---botón principal --- */
    .btn-eco-redundante {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 1.5rem;
      border: none;
      border-radius: 50px; 
      background: #28a745; 
      color: white; 
      cursor: pointer; 
      box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4); 
    }

    /* --- Hover del botón --- */
    .btn-eco-redundante:hover {
      background: #1e7e34; /
    }

    /* --- Footer --- */
    footer {
      text-align: center;
      padding: 15px;
      background: #222; 
      color: white;
    }
  </style>
</head>
<body>

  <div class="hero-gigante">
    <h1>Salvemos el Planeta</h1>
    <p>Únete a la revolución verde de GreenTech.</p>
    <button class="btn-eco-redundante">🌿 Quiero ayudar</button>
  </div>

  <footer>GreenTech Solutions © 2026 - Haciendo un mundo mejor</footer>

</body>
</html>
